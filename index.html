        /* === base reset === */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Consolas', monospace;

        #game-frame {

        /* === perfect rectangular RGB box – balanced size === */
        #signal-box {
            position: absolute; 
            top: 12%;

            transform: translateX(-50%);
            width: 200px;           /* slight extra width for comfort */
            background: #000;
            border-radius: 12px;
            color: #fff; 
            z-index: 9999; 
            cursor: move; 
            padding: 14px 12px;    
            text-align: center; 
            user-select: none;
            touch-action: none;
            overflow: hidden;
            
            border: 2px solid #ff0000;
            animation: rgb-border 3s linear infinite, colorful-glow 2s ease-in-out infinite;

        /* RGB Border */
        @keyframes rgb-border {
            0% { border-color: #ff0000; }
            17% { border-color: #ff8800; }
            33% { border-color: #ffff00; }
            50% { border-color: #00ff00; }
            67% { border-color: #0088ff; }
            83% { border-color: #0000ff; }
            100% { border-color: #ff00ff; }

        /* Colorful Glow */
        @keyframes colorful-glow {
            0% { box-shadow: 0 0 12px #ff0000, 0 0 25px #ff0000; }
            20% { box-shadow: 0 0 12px #ff8800, 0 0 25px #ff8800; }
            40% { box-shadow: 0 0 12px #ffff00, 0 0 25px #ffff00; }
            60% { box-shadow: 0 0 12px #00ff00, 0 0 25px #00ff00; }
            80% { box-shadow: 0 0 12px #0000ff, 0 0 25px #0000ff; }
            100% { box-shadow: 0 0 12px #ff00ff, 0 0 25px #ff00ff; }

            background: #00ff00;
            box-shadow: 0 0 20px 2px #00ff00;

        @keyframes scan-move {

            font-size: 11px;
            font-weight: bold;
            text-decoration: none;
            color: #0088cc;
            transition: 0.3s;
            animation: telegram-pulse 2s infinite;
        }
        .telegram-login-link:hover {

            color: #000;
            border-color: #fff;
        }
        @keyframes telegram-pulse {
            0% { box-shadow: 0 0 5px #0088cc; }
            50% { box-shadow: 0 0 15px #0088cc; }
            100% { box-shadow: 0 0 5px #0088cc; }
        }

        /* prediction container */

        .res-container {

            border-radius: 8px;

            animation: container-glow 3s linear infinite;

        @keyframes container-glow {
            0% { border-color: #ff0000; box-shadow: inset 0 0 12px #ff0000; }
            33% { border-color: #00ff00; box-shadow: inset 0 0 12px #00ff00; }
            66% { border-color: #0000ff; box-shadow: inset 0 0 12px #0000ff; }
            100% { border-color: #ff0000; box-shadow: inset 0 0 12px #ff0000; }
        }

        .label {

        .value {

        .timer {

        #seconds {

        @keyframes timer-blink {

        /* group button */

    <script>
        // --- DRAG (unchanged) ---
        const box = document.getElementById('signal-box');
        let isDragging = false;
        let offsetX, offsetY;

        const startDrag = (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.tagName === 'IMG') return;
            isDragging = true;
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            offsetX = clientX - box.offsetLeft;
            offsetY = clientY - box.offsetTop;
            box.style.transform = 'none';
        };

        const doDrag = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            box.style.left = (clientX - offsetX) + 'px';
            box.style.top = (clientY - offsetY) + 'px';
        };

        box.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', () => isDragging = false);
        box.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', doDrag, {passive: false});
        document.addEventListener('touchend', () => isDragging = false);

        // --- ACCESS & PREDICTION ---

            setInterval(() => {
                const now = new Date();

                let p = Math.floor(ms / 30000);
                let seed = p * 1.234;
                let idx = Math.floor(Math.abs(Math.sin(seed) * list.length)) % list.length;
                
                let resultData = list[idx].split(' ');

                const totalSec = now.getSeconds();
                const remaining = totalSec >= 30 ? 60 - totalSec : 30 - totalSec;
                document.getElementById('seconds').innerText = remaining;

            }, 1000);
        }
